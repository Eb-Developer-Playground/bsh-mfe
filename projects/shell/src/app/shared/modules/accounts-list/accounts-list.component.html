<div class="mat-elevation-z8">
  <table mat-table class="full-width-table" matSort aria-label="Elements">
    <ng-container matColumnDef="cif">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>CIF</th>
      <td mat-cell *matCellDef="let row">{{ row.cif }}</td>
    </ng-container>
    <ng-container matColumnDef="account_name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Account name</th>
      <td mat-cell *matCellDef="let row">{{ row.account_name }}</td>
    </ng-container>
    <ng-container matColumnDef="account_number">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Account number</th>
      <td mat-cell *matCellDef="let row">{{ row.account_number }}</td>
    </ng-container>
    <ng-container matColumnDef="scheme_code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Scheme code</th>
      <td mat-cell *matCellDef="let row">{{ row.scheme_code }}</td>
    </ng-container>
    <ng-container matColumnDef="verification_doc">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Verification document
      </th>
      <td mat-cell *matCellDef="let row">
        <input
          type="text"
          [value]="row.verification_doc"
          class="form-control"
          required />
      </td>
    </ng-container>
    <ng-container matColumnDef="funds_source">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Source of funds</th>
      <td mat-cell *matCellDef="let row">
        <input
          type="text"
          [value]="row.funds_source"
          class="form-control"
          required />
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    #paginator
    [length]="dataSource?.data?.length"
    [pageIndex]="0"
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 20]"
    aria-label="Select page">
  </mat-paginator>
</div>
