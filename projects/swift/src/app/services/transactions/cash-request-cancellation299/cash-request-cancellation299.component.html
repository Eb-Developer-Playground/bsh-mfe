<app-additional-fields
  #fieldsComp
  [title]="'PAGES.CASH_REQUEST_299_CANCELLATION.TITLE' | translate"
  [fieldAttributes]="fields">
</app-additional-fields>
<div class="mt-15 mt-15"></div>
<app-documents-upload
  (onUploaded)="documents = $event"
  [requiredDocuments]="requiredDocs"
  [title]="'COMMON.REQUIRED_DOCUMENTS.LABEL' | translate"
  [description]="'COMMON.REQUIRED_DOCUMENTS.TEXT' | translate">
</app-documents-upload>
<div class="mt-15 mb-15"></div>
<div class="flex flex-row mt-15">
  <button mat-stroked-button color="primary" [routerLink]="['/services/']">
    {{ 'COMMON.QUIT' | translate }}
  </button>
  <span class="flex-1"></span>
  <button mat-raised-button color="primary" [disabled]="!fieldsForm?.valid" (click)="submit()">
    {{ 'COMMON.SUBMIT' | translate }}
  </button>
</div>
