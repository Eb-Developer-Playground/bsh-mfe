<div *ngFor="let item of signatory">
  <mat-accordion>
    <mat-expansion-panel class="mat-elevation-z0">
      <mat-expansion-panel-header>
        <mat-panel-title>
          {{ item.code }}
        </mat-panel-title>
      </mat-expansion-panel-header>
      <p>{{ item.description }}</p>
    </mat-expansion-panel>
  </mat-accordion>
</div>
