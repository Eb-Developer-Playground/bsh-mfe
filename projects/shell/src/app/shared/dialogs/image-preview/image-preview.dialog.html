<div mat-dialog-content class="image-preview">
  <div class="modal-header">
    <h4 mat-dialog-title class="modal-title">
      {{ 'COMMON.IMAGE-PREVIEW' | translate }}
    </h4>
    <button
      type="button"
      class="close"
      (click)="hide()"
      data-dismiss="modal"
      aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div mat-dialog-content class="modal-body">
    <img [src]="imageSource" />
  </div>
</div>
