<div mat-dialog-content>
  <div class="d-flex mb-15">
    <span class="fw-500" style="font-size: 18px">Send terms & conditions?</span>
    <span class="spacer"></span>
    <mat-icon
      style="width: 15px"
      [svgIcon]="'ic-close'"
      [mat-dialog-close]="null">
    </mat-icon>
  </div>
  <p style="font-size: 14px; color: #929497">
    Please confirm that the customer's phone number and email are correct before
    sending.
  </p>
  <div *ngIf="data.email" class="d-flex align-items-center item mb-15">
    <mat-icon svgIcon="ic-mail"></mat-icon>&nbsp;&nbsp;
    <div>
      <span class="title text-muted">Email address</span><br />
      <span class="sub-title" *ngIf="data.email">{{
        data.email ? (data.email | lowercase) : 'N/A'
      }}</span>
    </div>
  </div>
  <div *ngIf="data.phoneNumber" class="d-flex align-items-center item mb-15">
    <mat-icon svgIcon="ic-telephone"></mat-icon>&nbsp;&nbsp;
    <div>
      <span class="title text-muted">Phone number</span><br />
      <span class="sub-title">+{{ data.phoneNumber }}</span>
    </div>
  </div>

  <div class="d-flex align-items-center item">
    <mat-icon svgIcon="ic-link"></mat-icon>&nbsp;&nbsp;
    <div>
      <span class="sub-title">
        <a
          href="javascript:void(0);"
          class="termsLink"
          (click)="downloadTerms()"
          >Download Terms & Conditions</a
        >
      </span>
    </div>
  </div>

  <div class="d-flex mt-15">
    <span class="spacer"></span>
    <button mat-button color="primary" [mat-dialog-close]="null">
      No, cancel
    </button>
    <button
      color="primary"
      cdkFocusInitial
      mat-raised-button
      style="margin-left: 10px"
      [mat-dialog-close]="true">
      Yes, send
    </button>
  </div>
</div>
