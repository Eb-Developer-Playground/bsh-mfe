<div class="dialog">
  <div class="dialog-header">
    <h2 class="mat-dialog-title">
      {{ 'CUSTOMER.CUSTOMER-INFORMATION.EXISTING-CUSTOMEER' | translate }}
    </h2>
  </div>
  <div class="success-container pl-1">
    <h2 class="mat-subtitle-2 fw-200" style="color: #2f9803">
      {{ 'COMMON.CUSTOMER_CIF' | translate }}:
      <span>{{ customer.personalDetails.customerId }}</span>
    </h2>
  </div>
  <div class="dialog-content">
    <h3 class="mat-subtitle-2 fw-200">.</h3>
  </div>
  <div class="button-container">
    <button mat-stroked-button color="primary" class="eq-btn" (click)="close()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    <button
      mat-stroked-button
      class="eq-btn"
      style="margin-left: 10px"
      (click)="proceed()"
      type="reset">
      {{ 'COMMON.CONTINUE' | translate }}
    </button>
  </div>
</div>
