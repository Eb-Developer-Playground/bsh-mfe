<mat-dialog-content class="mat-typography">
  <mat-card appearance="outlined" class="mat-elevation-z0">
    <mat-card-title>
      <div>
        <div class="info-dialog-header">
          {{ data.title }}

          <button mat-icon-button class="close-button" mat-dialog-close>
            <mat-icon class="close-icon" color="primary">close</mat-icon>
          </button>
        </div>
      </div>
    </mat-card-title>
    <mat-card-subtitle>{{ data.subtitle }}</mat-card-subtitle>
    <mat-card-content>
      <dynamic-html [content]="body"></dynamic-html>
    </mat-card-content>
  </mat-card>
</mat-dialog-content>
<mat-card-actions align="end">
  <button mat-button mat-dialog-close mat-raised-button color="primary">
    {{ 'COMMON.CLOSE' | translate }}
  </button>
</mat-card-actions>
