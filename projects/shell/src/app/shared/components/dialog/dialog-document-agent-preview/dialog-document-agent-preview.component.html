<div class="d-flex flex-column">
  <div class="d-flex flex-row justify-content-between pt-15 pb-15">
    <div>
      <p class="mat-subtitle-1 m-0">{{ data?.agent?.agentname }}</p>
    </div>
    <div>
      <mat-icon
        aria-hidden="false"
        aria-label="close icon"
        class="close-icon"
        (click)="closeDialog()"
        >close</mat-icon
      >
    </div>
  </div>

  <div
    class="d-flex flex-column justify-content-center"
    style="align-items: center"
    *ngIf="customerPhotos; else no_photos">
    <div class="wrap_bd_right">
      <img
        *ngIf="customerPhotos?.photo"
        class="img_1"
        [src]="customerPhotos?.photo"
        alt="" />
    </div>
    <div class="wrap_bd_right">
      <img
        *ngIf="customerPhotos?.signaturePhoto"
        class="img_2"
        [src]="customerPhotos?.signaturePhoto"
        alt="" />
    </div>
  </div>
  <ng-template #no_photos>
    <!-- <p style="font-size: 15px;">No customer photos</p> -->
    <div class="customer-images">
      <mat-icon
        class="customer-image"
        svgIcon="ic-placeholder-potrait"
        aria-hidden="false"
        aria-label="placeholder-potrait"
        style="width: 141px; height: 141px">
      </mat-icon>
      <mat-icon
        class="customer-image"
        svgIcon="ic-placeholder-darker"
        aria-hidden="false"
        aria-label="placeholder"
        style="width: 141px; height: 100px"></mat-icon>
    </div>
  </ng-template>

  <div class="d-flex flex-row justify-content-end">
    <button mat-stroked-button color="primary" (click)="closeDialog()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
  </div>
</div>
