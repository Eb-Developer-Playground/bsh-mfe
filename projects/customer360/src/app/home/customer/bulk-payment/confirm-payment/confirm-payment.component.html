<div>
  <div class="header">
    <div class="d-flex justify-content-between">
      <h2>{{ 'BULK-TRANFER.SUBMIT-PAYMENTS' | translate }}</h2>
      <div>
        <!-- *ngIf="i > 0" -->
        <button mat-button mat-dialog-close>
          <mat-icon
            class="close-icon"
            color="primary"
            svgIcon="ic-close"></mat-icon>
        </button>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="payment-info">
      <mat-icon svgIcon="ic-red-info"></mat-icon>
      <span>{{ 'BULK-TRANFER.PAYMENTS-ERRORS' | translate }}</span>
    </div>
    <p>{{ 'BULK-TRANFER.PAYMENTS-ERRORS-TITLE' | translate }}</p>
    <div class="bottom-buttons">
      <div class="pb-15" fxLayout="row" style="margin-top: 15px">
        <span fxFlex></span>
        <button
          (click)="closeDialog(false)"
          class="btn-outline"
          color="primary"
          mat-stroked-button
          style="margin-right: 10px">
          {{ 'BULK-TRANFER.CANCEL' | translate }}
        </button>
        <button
          (click)="submit(true)"
          class="ml-15"
          color="primary"
          mat-raised-button>
          {{ 'BULK-TRANFER.CONFIRM' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
