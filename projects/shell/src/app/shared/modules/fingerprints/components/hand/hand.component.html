<div fxLayout="column" class="hand-box">
  <div>
    <p class="mat-subtitle-1">{{ label }}</p>
  </div>
  <div
    fxLayout="row"
    fxFlex="100"
    fxLayoutGap="12px"
    fxLayoutAlign="space-between center">
    <app-finger
      (onCapture)="getCapturedFingerPrints($event)"
      *ngFor="let finger of hand"
      [finger]="finger"
      [disabled]="disabled">
    </app-finger>
  </div>
</div>
